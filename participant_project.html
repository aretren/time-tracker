<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информация о проекте</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.3.5/air-datepicker.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="project-header-info">
                <h1 id="project-name-header">Загрузка...</h1>
                <span id="username-display"></span>
            </div>
            <a href="#" id="edit-project-btn" class="header-btn hidden" title="Редактировать проект">&#9998;</a>
            <a href="participant.html" class="header-back-btn" title="К моим проектам">&#8592;</a>
        </header>

        <main class="main-content project-page-layout">
            <div class="schedule-column">
                <div class="widget">
                    <h2>Календарь тренировок</h2>
                    <div id="calendar-container"></div>
                </div>
                <div class="widget">
                    <h2>Предстоящие тренировки</h2>
                    <ul id="training-list" class="training-list"></ul>
                </div>
            </div>
            <div class="management-column">
                <!-- Блок для материалов -->
                <div id="materials-widget" class="widget">
                    <h2 class="collapsible-header">Мои материалы</h2>
                    <div id="materials-content">
                        <!-- Сюда будет загружаться контент материалов -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/air-datepicker@3.3.5/air-datepicker.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="participant_project.js"></script>

    <!-- Image Viewer Modal -->
    <div id="image-viewer-modal" class="modal">
        <span class="close-btn" id="close-image-viewer-btn">&times;</span>
        <img class="modal-content" id="image-viewer-content">
        <button id="image-viewer-delete-btn" class="delete-photo-modal-btn" title="Удалить фото">🗑️</button>
    </div>

    <!-- Add Material Modal -->
    <div id="add-material-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Добавить материал</h2>
            <div id="material-type-selection">
                <button data-type="party">Партия</button>
                <button data-type="costume">Костюм</button>
                <button data-type="task">Задача</button>
            </div>
        </div>
    </div>
    </body>
    </html>
