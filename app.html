<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@uvarov.frontend/vanilla-calendar/build/vanilla-calendar.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="header-title">
                <h1>Time Tracker</h1>
                <span id="username-display"></span>
            </div>
        </header>

        <main class="main-content">
            <div class="top-panel">
                <div id="calendar-container"></div>
                <div class="brushes">
                    <div class="brush active" data-status="busy" title="Занят">🛑</div>
                    <div class="brush" data-status="free" title="Могу">✅</div>
                    <div class="brush" data-status="travel" title="Не знаю">🤷</div>
                    <div class="brush clear" data-status="clear" title="Очистить"></div>
                </div>
            </div>

            <div id="hourly-schedule">
                <!-- Часы будут генерироваться здесь -->
            </div>
        </main>
    </div>

    <!-- Radial Menu for time selection -->
    <div id="radial-menu" class="hidden">
        <div class="radial-segment" data-value="1"></div>
        <div class="radial-segment" data-value="2"></div>
        <div class="radial-segment" data-value="3"></div>
        <div class="radial-segment" data-value="4"></div>
        <div class="radial-segment" data-value="5"></div>
        <div class="radial-segment" data-value="6"></div>
        <div id="radial-menu-center"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@uvarov.frontend/vanilla-calendar/build/vanilla-calendar.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="app.js"></script>

</body>
</html>
