<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление проектом</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@uvarov.frontend/vanilla-calendar/build/vanilla-calendar.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-project-id="">

    <header class="app-header">
        <div class="header-title">
            <h1 id="project-name-header">Управление проектом</h1>
        </div>
        <button type="button" id="back-to-projects-btn" class="header-back-btn">&#8592;</button>
        <span id="username-display" class="hidden"></span>
    </header>

    <main class="main-content project-page-layout">
        <div class="schedule-column">
             <div id="suggested-days-container" class="widget">
                <div class="widget-header">
                    <h2>Потенциально удачные дни</h2>
                    <div class="widget-controls">
                        <button id="suggested-prev-month-btn" class="widget-nav-btn">&lt;</button>
                        <span id="suggested-month-display"></span>
                        <button id="suggested-next-month-btn" class="widget-nav-btn">&gt;</button>
                    </div>
                </div>
                <div id="suggested-days-list" class="day-suggestion-list-grid"></div>
            </div>
            <div class="widget">
                <div id="calendar-container"></div>
            </div>
            <div class="widget">
                <h2>Сводная таблица занятости</h2>
                <div id="combined-schedule-grid">
                    <!-- Grid will be generated by JS -->
                </div>
            </div>
        </div>
        <div class="management-column">
            <div class="widget">
                <h2>Тренировки</h2>
                <ul id="training-list" class="training-list"></ul>
                 <form id="add-training-form" class="add-form">
                    <div class="form-group">
                        <input type="datetime-local" id="training-time" required>
                    </div>
                    <div class="form-group">
                        <textarea id="training-comment" placeholder="Комментарий"></textarea>
                    </div>
                    <button type="submit">Назначить</button>
                </form>
            </div>
            <div class="widget">
                <h2>Участники</h2>
                <ul id="participant-list" class="participant-list"></ul>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@uvarov.frontend/vanilla-calendar/build/vanilla-calendar.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="project.js"></script>

</body>
</html>
