<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление проектом</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@uvarov.frontend/vanilla-calendar/build/vanilla-calendar.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-project-id="">

    <header class="app-header">
        <div class="header-title">
            <!-- Title and user info will be injected here by JS -->
        </div>
        <button type="button" id="back-to-projects-btn" class="header-back-btn">&#8592;</button>
        <span id="username-display" class="hidden"></span> <!-- Этот элемент был случайно удален -->
    </header>

    <main class="main-content project-page-layout">
        <div class="schedule-column">
            <div class="widget">
                <h2>Календарь и доступность</h2>
                <div id="calendar-container"></div>
            </div>
            <div class="widget">
                <h2>Сводная таблица занятости</h2>
                <div id="combined-schedule-grid">
                    <!-- Grid will be generated by JS -->
                </div>
            </div>
        </div>
        <div class="management-column">
            <div class="widget">
                <div class="widget-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>Тренировки</h2>
                    <button id="show-add-training-modal-btn" class="header-action-btn" title="Назначить тренировку" style="width: auto; font-size: 1.5rem;">+</button>
                </div>
                <ul id="training-list" class="training-list"></ul>
            </div>
            <!-- Блок для партий -->
            <div id="roles-widget" class="widget">
                <h2 class="collapsible-header">Партии</h2>
                <ul id="role-list" class="role-list">
                    <!-- Роли будут загружаться сюда -->
                </ul>
            </div>
            <div id="participants-widget" class="widget">
                <h2>Участники</h2>
                <ul id="participant-list" class="participant-list"></ul>
            </div>
            <div id="responsible-widget" class="widget">
                <h2>Ответственный за проект</h2>
                <div class="form-group">
                    <select id="responsible-user-select" class="form-group"></select>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Training Modal -->
    <div id="add-training-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Назначить новую тренировку</h2>
            <form id="add-training-form" class="add-form">
                <div class="form-group">
                    <label for="training-time">Дата и время</label>
                    <input type="datetime-local" id="training-time" required>
                </div>
                <div class="form-group">
                    <label for="training-location-select">Место проведения</label>
                    <select id="training-location-select"></select>
                    <input type="text" id="new-training-location-input" class="form-control hidden" placeholder="Введите новое место..." style="margin-top: 0.5rem;">
                </div>
                <div class="form-group">
                    <label for="training-comment">Комментарий</label>
                    <textarea id="training-comment" placeholder="Комментарий"></textarea>
                </div>
                <button type="submit">Назначить</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@uvarov.frontend/vanilla-calendar/build/vanilla-calendar.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="project.js"></script>

</body>
</html>
